apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keda-demo.fullname" . }}
  labels:
    {{- include "keda-demo.labels" . | nindent 4 }}
spec:
  # replicas is intentionally omitted — KEDA owns replica count.
  selector:
    matchLabels:
      {{- include "keda-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keda-demo.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

image:
  repository: nginx
  tag: "1.25"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

scaler:
  # IANA timezone for the cron expressions below.
  timezone: "UTC"
  # Scale UP to desiredReplicas at every even minute (0, 2, 4, …).
  start: "*/2 * * * *"
  # Scale DOWN to minReplicaCount at every odd minute (1, 3, 5, …).
  end: "1/2 * * * *"
  desiredReplicas: "3"
  minReplicaCount: 0
  maxReplicaCount: 3
